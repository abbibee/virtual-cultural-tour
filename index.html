<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>virtual cultural tours</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="background" id="bg"></div>

  <main class="container">
    <!-- Left panel: intro text -->
    <section class="glass left-panel">
      <h1>Virtual Cultural Tours</h1>
      <div class="accent"></div>
      <p>Explore beautiful destinations from around the world all in one place.</p>
    </section>

    <!-- Right panel: country buttons -->
    <section class="glass right-panel">
      <a href="france.html" class="country-btn" style="background-image: url('images/france.jpg');">
        <span>france</span>
      </a>

      <a href="japan.html" class="country-btn" style="background-image: url('images/japan.jpg');">
        <span>japan</span>
      </a>

      <a href="spain.html" class="country-btn" style="background-image: url('images/spain.jpg');">
        <span>spain</span>
      </a>

      <a href="egypt.html" class="country-btn" style="background-image: url('images/egypt.jpg');">
        <span>egypt</span>
      </a>

      <a href="germany.html" class="country-btn" style="background-image: url('images/germany.jpg');">
        <span>germany</span>
      </a>
    </section>
  </main>

<script src="js/main.js"></script>
</body>
</html>
